fullnameOverride: otel-collector
image:
  repository: otel/opentelemetry-collector-contrib
  tag: latest
mode: deployment
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  processors:
    batch:
      send_batch_size: 1000
      timeout: 10s
    resourcedetection/internal:
      detectors: ["env", "system"]
    k8sattributes:
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.node.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip

  exporters:
    prometheusremotewrite:
      endpoint: "http://prometheus-server.monitoring.svc.cluster.local/api/v1/write"
      resource_to_telemetry_conversion:
        enabled: true
      timeout: 60s
      tls:
        insecure: true
    otlphttp/loki:
      endpoint: "http://loki-gateway.monitoring.svc.cluster.local/otlp"
      tls:
        insecure: true
    otlphttp/tempo:
      endpoint: "http://tempo.monitoring.svc.cluster.local:4318"
      tls:
        insecure: true
    debug:
      verbosity: detailed

  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [k8sattributes, batch, resourcedetection/internal]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [k8sattributes, batch, resourcedetection/internal]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [k8sattributes, batch, resourcedetection/internal ]
        exporters: [otlphttp/tempo, debug]
