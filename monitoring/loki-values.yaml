deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'
  schemaConfig:
    configs:
      - from: 2024-04-01
        object_store: filesystem
        store: tsdb
        schema: v13
        index:
          prefix: index_
          period: 24h
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: null
    accessModes:
      - ReadWriteOnce
    size: 20Gi

# Disable other components that run by default in scalable mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable MinIO if you are not using S3 compatible object storage
minio:
  enabled: false