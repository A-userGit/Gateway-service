apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service-container
          image: gateway-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
          - name: CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: auth-client-secrets
                key: client-id
          - name: CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: auth-client-secrets
                key: client-secret

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
      nodePort: 8084
  type: NodePort