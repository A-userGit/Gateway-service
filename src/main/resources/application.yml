server:
  port: 8083
spring:
  application:
    name: gateway-service
    port: 8084
  security:
    oauth2:
      client:
        registration:
          my-oidc-client:
            provider: my-oidc-provider
            client-id: gateway-client
            client-secret: KLJIHUGJKKLIJHGHGGF
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: openid
        provider:
          my-oidc-provider:
            issuer-uri: http://auth-service:8082
            authorization-uri: http://auth-service:8082/oauth2/authorize
            token-uri: http://auth-service:8082/oauth2/token
            user-info-uri: http://auth-service:8082/oauth2/userinfo
            user-name-attribute: sub
            jwk-set-uri: http://auth-service:8082/oauth2/jwks

springdoc:
  swagger-ui:
    csrf:
      enabled: true
    oauth:
      client-id: gateway-client
      use-pkce-with-authorization-code-grant: false
    oauth2-redirect-url: http://gateway-service:8083/swagger-ui/oauth2-redirect.html
  oAuthFlow:
    authorizationUrl: http://auth-service:8082/oauth2/authorize
    tokenUrl: http://auth-service:8082/oauth2/token
    scopes: openid
swagger-server: http://localhost:8084/